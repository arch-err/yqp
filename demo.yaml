apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: production
  labels:
    app: web-frontend
    team: platform
    version: v2.4.1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
        version: v2.4.1
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
            - containerPort: 443
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
        - name: auth-sidecar
          image: auth-proxy:3.1.0
          ports:
            - containerPort: 8443
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
        - name: metrics-exporter
          image: prom/node-exporter:v1.7.0
          ports:
            - containerPort: 9100
      volumes:
        - name: tls-certs
          secret:
            secretName: web-frontend-tls
        - name: config
          configMap:
            name: web-frontend-config
